# ═══════════════════════════════════════════════════════════════════
# Infrastruktur-Services für CQRS/ES-Server
#
# Startet nur die Datenbank-/Service-Dependencies.
# Host.Grpc und Host.Blazor laufen nativ (für GPU-Zugriff).
#
# Verwendung:
#   docker compose -f docker-compose.infrastructure.yml up -d
#
# Alle Ports binden an localhost — die nativen Host-Prozesse
# verbinden sich über localhost:PORT.
# ═══════════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    container_name: cqrs-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: cqrs_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cqrs-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  consul:
    image: hashicorp/consul:1.19
    container_name: cqrs-consul
    restart: unless-stopped
    ports:
      - "127.0.0.1:8500:8500"
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
