        GetProduktionsTageDto get_produktions_tage = 24;
        GetAuditEintraegeDto get_audit_eintraege = 25;
        GetImagePairDto get_image_pair = 26;
        GetImagePairHistorieDto get_image_pair_historie = 27;
        GetLagerbestandDto get_lagerbestand = 28;
        GetProduktionsStripDto get_produktions_strip = 29;
        GetProduktionsVerlaufDto get_produktions_verlauf = 30;
