    string event_id = 1;
    string aggregate_id = 2;
    string aggregate_type = 3;
    int32 aggregate_version = 4;
    int64 created_at_utc = 5;
    string causation_id = 6;
    string correlation_id = 7;
    string user_id = 8;
    string target_subscriber_id = 9;
    
    oneof payload {
        ImagePairInspiziertDto image_pair_inspiziert = 20;
        ImagePairKomplettDto image_pair_komplett = 21;
        PaarNichtKomplettDto paar_nicht_komplett = 22;
        LagerartikelDeaktiviertDto lagerartikel_deaktiviert = 23;
        AlsErledigtMarkiertDto als_erledigt_markiert = 24;
        ArchiviertDto archiviert = 25;
        WiederGeoeffnetDto wieder_geoeffnet = 26;
        CommandFailedDto command_failed = 27;
        BildNichtVerfuegbarDto bild_nicht_verfuegbar = 28;
        BildPaarDurchKiKlassifiziertDto bild_paar_durch_ki_klassifiziert = 29;
        BildPaarGelabeltDto bild_paar_gelabelt = 30;
        BildRegionGelabeltDto bild_region_gelabelt = 31;
        BildVerfuegbarDto bild_verfuegbar = 32;
        BildVersionBereitsVerfuegbarDto bild_version_bereits_verfuegbar = 33;
        EinzelBildDurchKiKlassifiziertDto einzel_bild_durch_ki_klassifiziert = 34;
        EinzelBildGelabeltDto einzel_bild_gelabelt = 35;
        ImagePairEingabeUngueltigDto image_pair_eingabe_ungueltig = 36;
        ImagePairErstelltDto image_pair_erstellt = 37;
        ImagePairExistiertBereitsDto image_pair_existiert_bereits = 38;
        ImagePairNichtGefundenDto image_pair_nicht_gefunden = 39;
        PhysischesProduktGelabeltDto physisches_produkt_gelabelt = 40;
        RegionIndexUngueltigDto region_index_ungueltig = 41;
        RegionLabelsUngueltigDto region_labels_ungueltig = 42;
        ArtikelExistiertBereitsDto artikel_existiert_bereits = 43;
        ArtikelInaktivDto artikel_inaktiv = 44;
        ArtikelNichtGefundenDto artikel_nicht_gefunden = 45;
        BestandNichtAusreichendDto bestand_nicht_ausreichend = 46;
        BestandReserviertDto bestand_reserviert = 47;
        EingabeUngueltigDto eingabe_ungueltig = 48;
        EinkaufspreisAngepasstDto einkaufspreis_angepasst = 49;
        LagerartikelErstelltDto lagerartikel_erstellt = 50;
        LagerplatzGeaendertDto lagerplatz_geaendert = 51;
        LieferantZugeordnetDto lieferant_zugeordnet = 52;
        NachbestellungAngefordertDto nachbestellung_angefordert = 53;
        VerfuegbarerBestandNichtAusreichendDto verfuegbarer_bestand_nicht_ausreichend = 54;
        WarenabgangGebuchtDto warenabgang_gebucht = 55;
        WareneingangGebuchtDto wareneingang_gebucht = 56;
        NameGeaendertDto name_geaendert = 57;
        ProfilErstelltDto profil_erstellt = 58;
        PrioritaetGesetztDto prioritaet_gesetzt = 59;
        TagEntferntDto tag_entfernt = 60;
        TagHinzugefuegtDto tag_hinzugefuegt = 61;
        TitelGeaendertDto titel_geaendert = 62;
        TodoBereitsArchiviertDto todo_bereits_archiviert = 63;
        TodoBereitsErledigtDto todo_bereits_erledigt = 64;
        TodoEingabeUngueltigDto todo_eingabe_ungueltig = 65;
        TodoErstelltDto todo_erstellt = 66;
        TodoExistiertBereitsDto todo_existiert_bereits = 67;
        TodoNichtErledigtDto todo_nicht_erledigt = 68;
        TodoNichtGefundenDto todo_nicht_gefunden = 69;

    }
}

message QueryPayloadDto {
    oneof payload {
        GetAlleAuditEintraegeDto get_alle_audit_eintraege = 20;
        GetAlleTodosDto get_alle_todos = 21;
        GetAllLagerbestaendeDto get_all_lagerbestaende = 22;
