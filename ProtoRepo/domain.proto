syntax = "proto3";

option csharp_namespace = "ProtoRepo";

package CqrsSolution;

// ============================================================================
// gRPC SERVICE
// ============================================================================

service CqrsClientService {
    rpc Connect(stream ClientMessage) returns (stream ServerMessage);
}

// ============================================================================
// CLIENT → SERVER (Upstream)
// ============================================================================

message ClientMessage {
    oneof message {
        CommandRequest command = 1;
        SubscribeRequest subscribe = 2;
        UnsubscribeRequest unsubscribe = 3;
        CapabilitiesRequest capabilities = 4;
        QueryRequest query = 5;
    }
}

message CommandRequest {
    CommandEnvelopeDto envelope = 1;
}

message SubscribeRequest {
    string event_type = 1;
    string aggregate_id = 2;
}

message UnsubscribeRequest {
    string event_type = 1;
    string aggregate_id = 2;
}

message CapabilitiesRequest {
    repeated string event_types = 1;
}

message QueryRequest {
    string correlation_id = 1;
    QueryPayloadDto payload = 2;
}

// ============================================================================
// SERVER → CLIENT (Downstream)
// ============================================================================

message ServerMessage {
    oneof message {
        EventNotification event = 1;
        SubscriptionConfirmed subscription_confirmed = 2;
        UnsubscriptionConfirmed unsubscription_confirmed = 3;
        CommandAccepted command_accepted = 4;
        ErrorResponse error = 5;
        CapabilitiesResponse capabilities_response = 6;
        QueryResponse query_response = 7;
    }
}

message EventNotification {
    EventEnvelopeDto envelope = 1;
}

message SubscriptionConfirmed {
    string event_type = 1;
    string aggregate_id = 2;
}

message UnsubscriptionConfirmed {
    string event_type = 1;
    string aggregate_id = 2;
}

message CommandAccepted {
    string command_id = 1;
    string correlation_id = 2;
}

message CapabilitiesResponse {
    string session_id = 1;
    repeated string allowed_commands = 2;
    repeated string subscribed_events = 3;
    repeated string supported_queries = 4;
}

message QueryResponse {
    string correlation_id = 1;
    QueryResponsePayloadDto payload = 2;
    repeated AggregateMetaDto deps = 3;
}

message AggregateMetaDto {
    string id = 1;
    string aggregate_type = 2;
    int32 version = 3;
}

message ErrorResponse {
    string code = 1;
    string message = 2;
    string correlation_id = 3;
}

// ============================================================================
// ENVELOPE TYPES
// ============================================================================

message CommandEnvelopeDto {
    string command_id = 1;
    string aggregate_id = 2;
    string aggregate_type = 3;
    int32 expected_version = 4;
    int64 created_at_utc = 5;
    string correlation_id = 6;
    string user_id = 7;
    string origin_session_id = 8;

    oneof payload {
        ErstelleImagePairDto erstelle_image_pair = 20;
        KlassifiziereBildPaarDurchKiDto klassifiziere_bild_paar_durch_ki = 21;
        KlassifiziereEinzelBildDurchKiDto klassifiziere_einzel_bild_durch_ki = 22;
        LabelBildPaarDto label_bild_paar = 23;
        LabelBildRegionDto label_bild_region = 24;
        LabelEinzelBildDto label_einzel_bild = 25;
        LabelPhysischesProduktDto label_physisches_produkt = 26;
        MarkiereAlsInspiziertDto markiere_als_inspiziert = 27;
        MeldeBildVerfuegbarDto melde_bild_verfuegbar = 28;
        AendereLagerplatzDto aendere_lagerplatz = 29;
        BucheWarenabgangDto buche_warenabgang = 30;
        BucheWareneingangDto buche_wareneingang = 31;
        DeaktiviereLagerartikelDto deaktiviere_lagerartikel = 32;
        ErstelleLagerartikelDto erstelle_lagerartikel = 33;
        OrdneLieferantZuDto ordne_lieferant_zu = 34;
        PasseEinkaufspreisAnDto passe_einkaufspreis_an = 35;
        ReserviereBestandDto reserviere_bestand = 36;
        AendereProfilnamenDto aendere_profilnamen = 37;
        ErstelleProfilDto erstelle_profil = 38;
        AendereTitelDto aendere_titel = 39;
        ArchiviereDto archiviere = 40;
        EntferneTagDto entferne_tag = 41;
        ErstelleTodoDto erstelle_todo = 42;
        FuegeTagHinzuDto fuege_tag_hinzu = 43;
        MarkiereAlsErledigtDto markiere_als_erledigt = 44;
        OeffneWiederDto oeffne_wieder = 45;
        SetzePrioritaetDto setze_prioritaet = 46;

    }
}

